<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Grocery App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1b5e20">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/j57H1PP8/file-0000000062fc7208bcb58f5264a5b1d7.png">

    <style>
        :root { --primary: #1b5e20; --bg: #f4f7f4; --secondary: #388e3c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg); 
            padding: 0; 
            margin: 0; 
            /* मोबाइल ओवरफ्लो फिक्स */
            overflow-x: hidden;
            width: 100%;
        }

        .container { 
            width: 100%;
            max-width: 500px; 
            margin: auto; 
            background: white; 
            padding: 15px; 
            /* स्क्रीन हाइट फिक्स */
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            box-shadow: none;
        }

        h1 { text-align: center; color: var(--primary); font-size: 1.2rem; border-bottom: 2px solid #eee; padding-bottom: 10px; margin: 10px 0; }
        
        #home-page { flex-grow: 1; width: 100%; }

        .category-item { 
            background: #f1f8e9; 
            margin: 8px 0; 
            padding: 15px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            display: flex; 
            justify-content: space-between; 
            border: 1px solid #dcedc8;
            font-size: 0.95rem;
        }

        .hidden { display: none !important; }

        .item-row { padding: 12px 0; border-bottom: 1px solid #eee; width: 100%; }
        
        .item-name { 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 10px; 
            color: #333;
            font-size: 1rem;
        }

        /* ग्रिड को मोबाइल के लिए बेहतर बनाया */
        .controls-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 5px; 
            margin-bottom: 8px; 
        }

        input, select { 
            padding: 10px 5px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            font-size: 0.9rem; 
            width: 100%; 
            outline: none;
        }

        .total-box { 
            background: #fffde7; 
            padding: 6px; 
            border-radius: 6px; 
            text-align: right; 
            font-weight: bold; 
            color: #d32f2f; 
            font-size: 0.85rem; 
        }

        .summary-card { background: #e8f5e9; border: 2px dashed var(--primary); padding: 12px; border-radius: 10px; margin: 10px 0; width: 100%; }
        .summary-item { display: flex; justify-content: space-between; border-bottom: 1px solid #c8e6c9; padding: 5px 0; font-size: 0.9rem; }
        
        .btn-summary { 
            background: #ff9800; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            width: 100%; 
            font-weight: bold; 
            margin-bottom: 10px; 
            cursor: pointer;
            font-size: 0.9rem;
        }

        .footer-btns { 
            background: white; 
            padding: 15px 0; 
            display: flex; 
            gap: 8px; 
            margin-top: 10px;
        }

        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-back { background: #eceff1; color: #455a64; }
        .btn-save { background: var(--primary); color: white; }
        
        .whatsapp-section { 
            margin-top: auto; 
            padding-top: 15px; 
            border-top: 2px solid #eee; 
            background: white;
        }

        .num-row { display: flex; gap: 5px; width: 100%; }
        .num-input { flex: 1; border: 2px solid #81c784; font-size: 1rem; }
        .btn-contact { background: #007bff; color: white; padding: 0 10px; font-size: 0.75rem; border-radius: 6px; }
        
        .btn-wa { 
            background: #25D366; 
            color: white; 
            width: 100%; 
            font-size: 1.1rem; 
            height: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            border-radius: 10px; 
            margin-top: 10px;
        }
        
        /* Checkbox साइज फिक्स */
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }

    </style>
</head>
<body>

<div class="container">
    <div id="home-page">
        <h1>সব ধরনের সামগ্রী লিস্ট</h1>
        
        <button class="btn-summary" onclick="toggleSummary()">অর্ডার সামারি দেখুন</button>
        
        <div id="summary-view" class="summary-card hidden">
            <h3 style="margin-top:0; color: var(--primary); font-size: 1rem;">নির্বাচিত আইটেম:</h3>
            <div id="summary-list"></div>
            <div id="grand-total-summary" style="text-align:right; font-weight:bold; margin-top:10px; color: #d32f2f;"></div>
        </div>

        <div id="category-list"></div>
    </div>

    <div id="items-page" class="hidden">
        <h1 id="cat-title">Items</h1>
        <div id="items-container"></div>
        <div class="footer-btns">
            <button class="btn-back" onclick="saveAndGoHome()">Back</button>
            <button class="btn-save" onclick="saveAndGoHome()">Save</button>
        </div>
    </div>

    <div class="whatsapp-section">
        <div class="contact-picker-area">
            <label style="font-weight: bold; color: #555; font-size: 0.8rem; margin-bottom: 5px; display: block;">নম্বর লিখুন (WhatsApp Number):</label>
            <div class="num-row">
                <input type="tel" id="wa-num" class="num-input" placeholder="91XXXXXXXXXX">
                <button id="btn-picker" class="btn-contact" onclick="selectFromContacts()">Contacts</button>
            </div>
        </div>

        <button class="btn-wa" onclick="sendWA()">
            <span>WhatsApp-এ অর্ডার দিন</span>
        </button>
    </div>
</div>

<script>
    // आपका पुराना JavaScript यहाँ रहेगा (कोई बदलाव की जरूरत नहीं)
    const data = {
        "A) নিত্যপ্রয়োজনীয় সবজি": ["আলু", "পেঁয়াজ", "আদা", "রসুন", "কাঁচা লঙ্কা"],
        "B) ডাল ও শস্য": ["চাল", "আটা", "ময়দা", "সর্ষের তেল", "চিনি", "চা পাতা", "মুসুর ডাল", "মুড়ি", "গুড়", "মটর", "মুগ ডাল", "ছোলা", "অড়হর ডাল"],
        "C) মশলার তালিকা": ["হলুদ", "কাশ্মীরি লঙ্কা গুঁড়ো", "ধনে গুঁড়ো", "জিরে গুঁড়ো", "নুন", "বিরিয়ানি মশলা", "চিকেন মশলা", "মাংসের মশলা", "পোস্ত", "সর্ষে", "তেজপাতা", "পাঁচ ফোড়ন", "লবঙ্গ", "গরম মশলা", "মৌরি", "গোলমরিচ", "কালো জিরে", "হিং", "দারুচিনি", "এলাচ", "বড় এলাচ", "কসুরি মেথি", "জোয়ান", "চাট মশলা", "জায়ফল", "জয়িত্রী"],
        "D) তাজা সবজি": ["শসা", "ধনে পাতা", "লেবু", "গাজর", "টমেটো", "বেগুন", "পটল", "করলা", "কুমড়ো", "ঢ্যাঁড়স", "ফুলকপি", "বাঁধাকপি", "মুলো", "লাউ", "ঝিঙে", "পেঁপে"],
        "E) তাজা ফল": ["কলা", "আপেল", "পেয়ারা", "আঙুর", "বেদানা", "আম", "লিচু", "তরমুজ", "নারকেল", "আনারস"],
        "F) শুকনো ফল": ["কাজু", "আখরোট", "খেজুর", "কাঠবাদাম", "কিসমিস", "চীনাবাদাম", "পেস্তা"]
    };

    let selectedItems = {};

    function init() {
        const list = document.getElementById('category-list');
        for (let cat in data) {
            let d = document.createElement('div');
            d.className = 'category-item';
            d.innerHTML = `<span>${cat}</span> <span>➔</span>`;
            d.onclick = () => showCat(cat);
            list.appendChild(d);
        }
    }

    function showCat(cat) {
        document.getElementById('home-page').classList.add('hidden');
        document.getElementById('items-page').classList.remove('hidden');
        document.getElementById('cat-title').innerText = cat;
        const container = document.getElementById('items-container');
        container.innerHTML = '';

        data[cat].forEach(item => {
            const saved = selectedItems[item] || { qty: '', unit: 'Kg', rate: '' };
            let isChecked = selectedItems[item] ? 'checked' : '';
            let div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `
                <div class="item-name"><input type="checkbox" id="chk-${item}" ${isChecked}> <label>${item}</label></div>
                <div class="controls-grid">
                    <input type="number" id="q-${item}" placeholder="Qty" value="${saved.qty}" oninput="updatePrice('${item}')">
                    <select id="u-${item}" onchange="updatePrice('${item}')">
                        <option value="Kg" ${saved.unit==='Kg'?'selected':''}>Kg</option>
                        <option value="Gm" ${saved.unit==='Gm'?'selected':''}>Gm</option>
                        <option value="Pcs" ${saved.unit==='Pcs'?'selected':''}>Pcs</option>
                    </select>
                    <input type="number" id="r-${item}" placeholder="Rate" value="${saved.rate}" oninput="updatePrice('${item}')">
                </div>
                <div class="total-box">মোট দাম: ₹ <span id="t-${item}">0.00</span></div>
            `;
            container.appendChild(div);
            updatePrice(item);
        });
        window.scrollTo(0,0); // स्क्रॉल टॉप पर लाएं
    }

    function updatePrice(item) {
        const q = parseFloat(document.getElementById(`q-${item}`).value) || 0;
        const u = document.getElementById(`u-${item}`).value;
        const r = parseFloat(document.getElementById(`r-${item}`).value) || 0;
        let total = (u === "Gm") ? (r / 1000) * q : q * r;
        document.getElementById(`t-${item}`).innerText = total.toFixed(2);
    }

    function saveAndGoHome() {
        document.querySelectorAll('.item-row').forEach(row => {
            const name = row.querySelector('label').innerText;
            const isChecked = row.querySelector('input[type="checkbox"]').checked;
            const qty = row.querySelector('input[id^="q-"]').value;

            if (isChecked && qty > 0) {
                selectedItems[name] = {
                    qty: qty,
                    unit: row.querySelector('select').value,
                    rate: row.querySelector('input[id^="r-"]').value
                };
            } else { delete selectedItems[name]; }
        });
        updateSummary();
        document.getElementById('home-page').classList.remove('hidden');
        document.getElementById('items-page').classList.add('hidden');
        window.scrollTo(0,0);
    }

    function toggleSummary() {
        const view = document.getElementById('summary-view');
        view.classList.toggle('hidden');
        updateSummary();
    }

    function updateSummary() {
        const listDiv = document.getElementById('summary-list');
        const grandTotalDiv = document.getElementById('grand-total-summary');
        listDiv.innerHTML = '';
        let grandTotal = 0;
        let count = 0;

        for (let name in selectedItems) {
            let itm = selectedItems[name];
            let itemTotal = itm.unit === "Gm" ? (itm.rate/1000)*itm.qty : itm.qty*itm.rate;
            grandTotal += itemTotal;
            count++;

            listDiv.innerHTML += `
                <div class="summary-item">
                    <span>${name} (${itm.qty} ${itm.unit})</span>
                    <span>₹${itemTotal.toFixed(2)}</span>
                </div>
            `;
        }

        if (count === 0) {
            listDiv.innerHTML = '<p style="color:#666; font-size:12px;">কোনো আইটেম নেই</p>';
            grandTotalDiv.innerText = "";
        } else {
            grandTotalDiv.innerText = "মোট: ₹ " + grandTotal.toFixed(2);
        }
    }

    function sendWA() {
        const num = document.getElementById('wa-num').value;
        if(!num) return alert("নম্বর লিখুন!");
        
        let msg = "*🛒 বাজার লিস্ট:* \n";
        let grandTotal = 0;
        let hasItems = false;
        
        for (let key in selectedItems) {
            let itm = selectedItems[key];
            let itemTotal = itm.unit === "Gm" ? (itm.rate/1000)*itm.qty : itm.qty*itm.rate;
            msg += `\n✅ *${key}*: ${itm.qty} ${itm.unit} = *₹${itemTotal.toFixed(2)}*`;
            grandTotal += itemTotal;
            hasItems = true;
        }
        
        if(!hasItems) return alert("আইটেম যোগ করুন!");
        msg += `\n\n💰 *সর্বমোট: ₹${grandTotal.toFixed(2)}*`;
        window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`);
    }

    async function selectFromContacts() {
        try {
            const contacts = await navigator.contacts.select(['tel'], { multiple: false });
            if (contacts.length && contacts[0].tel.length > 0) {
                let rawNum = contacts[0].tel[0].replace(/\D/g, '');
                if(rawNum.length === 10) rawNum = "91" + rawNum;
                document.getElementById('wa-num').value = rawNum;
            }
        } catch (err) { alert("Not supported on this browser."); }
    }

    init();
</script>
</body>
</html>
